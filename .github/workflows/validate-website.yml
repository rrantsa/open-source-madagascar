name: Validate Catalogue and Website

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Generate enriched website data
        run: node scripts/generate_website_data.mjs --fetch

      - name: Validate catalogue JSON
        shell: pwsh
        run: ./scripts/validate_catalogue_data.ps1

      - name: Build website
        working-directory: website
        env:
          VITE_BASE_PATH: /
        run: npm run build
